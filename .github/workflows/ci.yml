name: CI Pipeline

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        java: [8, 11, 17, 21]
        exclude:
          # Exclude problematic combinations
          - os: windows-latest
            java: 8
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Validate Maven wrapper
        run: mvn -version
      
      - name: Compile code
        run: mvn clean compile
      
      - name: Run tests
        run: mvn test
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.os }}-${{ matrix.java }}
          path: |
            target/surefire-reports/
            target/failsafe-reports/
          retention-days: 7
      
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: matrix.java == '17' && matrix.os == 'ubuntu-latest'
        with:
          name: coverage-reports
          path: |
            target/site/jacoco/
            target/site/test-coverage/
          retention-days: 7

  code-quality:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' || github.base_ref == 'main' || github.base_ref == 'master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run tests with coverage
        run: mvn clean test jacoco:report
      
      - name: Run Checkstyle
        run: mvn checkstyle:check || true
      
      - name: Run PMD
        run: mvn pmd:check || true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  security:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request' || github.base_ref == 'main' || github.base_ref == 'master'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Run OWASP Dependency Check
        run: mvn org.owasp:dependency-check-maven:check
        continue-on-error: true
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.xml
          retention-days: 30

  build-summary:
    runs-on: ubuntu-latest
    needs: [test, code-quality, security]
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Build Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Matrix**: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Code Quality**: ${{ needs.code-quality.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Security Scan**: ${{ needs.security.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Tests executed on multiple Java versions and platforms." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Code Quality" >> $GITHUB_STEP_SUMMARY
          echo "- Checkstyle validation completed" >> $GITHUB_STEP_SUMMARY
          echo "- PMD static analysis completed" >> $GITHUB_STEP_SUMMARY
          echo "- Test coverage analysis completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security" >> $GITHUB_STEP_SUMMARY
          echo "- OWASP Dependency Check completed" >> $GITHUB_STEP_SUMMARY
          echo "- Vulnerability analysis completed" >> $GITHUB_STEP_SUMMARY
